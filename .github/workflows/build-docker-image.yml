name: Build of Docker images

on:
  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: build-docker-image
  cancel-in-progress: false

jobs:
  build-docker-image:
    runs-on: self-hosted
    timeout-minutes: 720
    steps:
      - name: Clean working directory
        uses: AutoModality/action-clean@v1.1.0
      - name: Delete unnecessary folders to free disk space
        run: |
          rm -rf /opt/hostedtoolcache
          rm -rf /usr/local/android /usr/share/dotnet /usr/local/share/boost /opt/ghc
          docker system prune --all --volumes --force
      - name: Checkout out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get latest package version
        shell: bash
        run: |
          latest_version=$(git tag -l 'v[0-9]*\.[0-9]*\.[0-9]*' | sort | tail -1)
          echo "latest_version=${latest_version:1}" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build and push CPU docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_cpu
          push: true
          provenance: false
          tags: |
            josafatburmeister/pointtorch:${{ env.latest_version }}-torch2.10.0-cpu
            josafatburmeister/pointtorch:cpu
      - name: Delete previously built images to free disk space
        run: |
          docker system prune --all --volumes --force
      - name: Build and push GPU docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_gpu
          push: true
          provenance: false
          tags: |
            josafatburmeister/pointtorch:${{ env.latest_version }}-torch2.10.0-cu129
            josafatburmeister/pointtorch:cu129
            josafatburmeister/pointtorch:latest
      - name: Clean up docker build remains
        run: docker system prune --all --volumes --force
